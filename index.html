<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Quiz App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-header">
    <h5 class="m-0">🏥 Health Quiz App</h5>
  </div>
  <div class="container d-flex flex-column align-items-center justify-content-center min-vh-100 py-5">
    <div class="text-center mb-4 mt-5">
      <div class="bg-white rounded-circle d-inline-block p-2 shadow-sm mb-3" style="width: 150px; height: 150px; overflow: hidden; border: 5px solid rgba(79, 16, 16, 0.5);">
        <img src="https://cdn-icons-png.flaticon.com/512/2966/2966327.png" class="img-fluid" alt="Health Logo">
      </div>
      <h2 class="fw-bold">Health & Lifestyle Quiz</h2>
      <p class="text-muted small">Discover your habits and improve your lifestyle</p>
    </div>
    <div class="quiz-card shadow-lg mx-auto">
      <div id="progress" class="text-center small mb-2"></div>
      <div class="progress mb-3">
        <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
      </div>
      <div id="quiz">
        <h5 id="question" class="question fw-bold mb-3"></h5>
        <div id="answers" class="d-grid gap-2"></div>
        <button id="next" class="btn w-100 mt-3" disabled>
          Next Question
        </button>
        <div id="mini-msg">Please select an answer</div>
      </div>
      <div id="result" class="d-none text-center">
        <h4 class="fw-bold">Your Score: <span id="score"></span></h4>
        <p id="message"></p>
        <div id="tips" class="mt-3"></div>
        <button onclick="location.reload()" id="next" class="btn w-100 mt-3">
          Restart Quiz
        </button>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
